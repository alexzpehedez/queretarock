<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../assets/css/pages/login.css">  

    <link rel="icon" type="image/x-icon" href="../assets/img/icons/logo.ico"> 

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>

<body>

<div class="login-container">

    <section class="login-panel">

        <div class="logo">
            <a href="../index.html">
                <img src="../assets/img/icons/logo.png" alt="logo">
            </a>
        </div>

        <h2>Ingresa en tu cuenta para continuar.</h2>

        <div class="auth-tabs">
            <button class="tab active">Iniciar sesión</button>

            <button class="tab">
                <a href="register.html">Registrarse</a>
            </button>
        </div>

        <form class="login-form" id="loginForm">

            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email" required>
            </div>

            <div class="input-group password-group">
                <input type="password" id="loginPassword" placeholder="Introduzca la contraseña..." required>
                <i class="ri-eye-line"></i>
            </div>

            <button type="submit" class="login-btn">
                Iniciar sesión
            </button>

        </form>

        <div class="footer-text">
            Querétarock 2026 ®
        </div>

    </section>

    <section class="image-panel">
        <img src="../assets/img/categories/guitars.jpg" alt="Electric Guitar">
    </section>

</div>

<script type="module" src="../assets/js/modules/auth.js"></script>

</body>
</html>
